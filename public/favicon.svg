<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- ninja snorlax — matches the hero artwork (blue headband, cream face) -->
  <rect width="64" height="64" rx="14" fill="#141417"/>

  <!-- ears -->
  <path d="M14 23 Q11 7 25 12 Q21 16 19 21 Z" fill="#3a4448" stroke="#1c1c20" stroke-width="2" stroke-linejoin="round"/>
  <path d="M50 23 Q53 7 39 12 Q43 16 45 21 Z" fill="#3a4448" stroke="#1c1c20" stroke-width="2" stroke-linejoin="round"/>

  <!-- head -->
  <circle cx="32" cy="36" r="22" fill="#f2e3bd" stroke="#1c1c20" stroke-width="2.5"/>

  <!-- blue headband covering the top of the head -->
  <path d="M10.8 30 A 22 22 0 0 1 53.2 30 Q 32 35 10.8 30 Z" fill="#3f5a96" stroke="#1c1c20" stroke-width="2" stroke-linejoin="round"/>
  <!-- headband plate -->
  <rect x="26.5" y="19" width="11" height="6.5" rx="1.5" fill="#b9bec4" stroke="#1c1c20" stroke-width="1.5"/>

  <!-- closed eyes -->
  <path d="M21.5 39 q 3 2.4 6 0" fill="none" stroke="#1c1c20" stroke-width="2" stroke-linecap="round"/>
  <path d="M36.5 39 q 3 2.4 6 0" fill="none" stroke="#1c1c20" stroke-width="2" stroke-linecap="round"/>

  <!-- swirl blush -->
  <circle cx="18.5" cy="44" r="2.9" fill="#e8a7a7"/>
  <circle cx="45.5" cy="44" r="2.9" fill="#e8a7a7"/>

  <!-- mouth with tiny fangs -->
  <path d="M28 48.5 q 4 2 8 0" fill="none" stroke="#1c1c20" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M27.6 48.9 l 2.6 0.6 l -1 -3.4 Z" fill="#fff" stroke="#1c1c20" stroke-width="1"/>
  <path d="M36.4 48.9 l -2.6 0.6 l 1 -3.4 Z" fill="#fff" stroke="#1c1c20" stroke-width="1"/>
</svg>
